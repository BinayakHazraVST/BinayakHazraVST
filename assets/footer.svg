<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgClose" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0010"/>
      <stop offset="100%" style="stop-color:#060008"/>
    </linearGradient>
    <radialGradient id="flameGrad" cx="50%" cy="80%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:0"/>
    </radialGradient>
    <filter id="flameGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="140" fill="url(#bgClose)" rx="8"/>

  <!-- Top border -->
  <line x1="0" y1="0" x2="900" y2="0" stroke="#FFD700" stroke-width="2"/>
  <!-- Diamond ornaments on top border -->
  <polygon points="445,0 450,-5 455,0 450,5" fill="#FFD700"/>
  <polygon points="425,0 430,-4 435,0 430,4" fill="#FFD700" opacity="0.6"/>
  <polygon points="465,0 470,-4 475,0 470,4" fill="#FFD700" opacity="0.6"/>
  <polygon points="405,0 410,-3 415,0 410,3" fill="#FFD700" opacity="0.3"/>
  <polygon points="485,0 490,-3 495,0 490,3" fill="#FFD700" opacity="0.3"/>

  <!-- 7 Diya lamps row -->
  <!-- Diya 1 -->
  <g filter="url(#flameGlow)">
    <path d="M100,100 Q110,115 120,100 Q115,90 100,100Z" fill="#D4A017"/>
    <ellipse cx="110" cy="100" rx="10" ry="4" fill="#8B6914"/>
    <path d="M110,100 Q108,88 110,80 Q112,88 110,100" fill="url(#flameGrad)">
      <animateTransform attributeName="transform" type="rotate" values="-3,110,95;3,110,95;-3,110,95" dur="0.8s" repeatCount="indefinite"/>
    </path>
    <ellipse cx="110" cy="80" rx="4" ry="7" fill="#FF8C00" opacity="0.7">
      <animate attributeName="ry" values="7;5;7" dur="0.8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="110" cy="80" rx="2" ry="4" fill="#FFD700">
      <animate attributeName="ry" values="4;2;4" dur="0.8s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Diya 2 -->
  <g filter="url(#flameGlow)">
    <path d="M210,102 Q220,117 230,102 Q225,92 210,102Z" fill="#D4A017"/>
    <ellipse cx="220" cy="102" rx="10" ry="4" fill="#8B6914"/>
    <ellipse cx="220" cy="82" rx="4" ry="7" fill="#FF8C00" opacity="0.7">
      <animate attributeName="ry" values="7;5;7" dur="1.1s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="220" cy="82" rx="2" ry="4" fill="#FFD700">
      <animate attributeName="ry" values="4;2;4" dur="1.1s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Diya 3 -->
  <g filter="url(#flameGlow)">
    <path d="M320,100 Q330,115 340,100 Q335,90 320,100Z" fill="#D4A017"/>
    <ellipse cx="330" cy="100" rx="10" ry="4" fill="#8B6914"/>
    <ellipse cx="330" cy="80" rx="4" ry="7" fill="#FF8C00" opacity="0.7">
      <animate attributeName="ry" values="7;5;7" dur="0.9s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="330" cy="80" rx="2" ry="4" fill="#FFD700">
      <animate attributeName="ry" values="4;2;4" dur="0.9s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Center Diya (largest, center) -->
  <g filter="url(#flameGlow)">
    <path d="M436,98 Q450,116 464,98 Q458,85 436,98Z" fill="#D4A017"/>
    <ellipse cx="450" cy="98" rx="14" ry="6" fill="#8B6914"/>
    <ellipse cx="450" cy="73" rx="6" ry="10" fill="#FF8C00" opacity="0.8">
      <animate attributeName="ry" values="10;7;10" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="450;452;448;450" dur="0.7s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="450" cy="73" rx="3" ry="6" fill="#FFD700">
      <animate attributeName="ry" values="6;4;6" dur="0.7s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Extra glow -->
    <ellipse cx="450" cy="75" rx="14" ry="14" fill="#FFD700" opacity="0.07">
      <animate attributeName="opacity" values="0.07;0.15;0.07" dur="1.4s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Diya 5 -->
  <g filter="url(#flameGlow)">
    <path d="M556,100 Q566,115 576,100 Q571,90 556,100Z" fill="#D4A017"/>
    <ellipse cx="566" cy="100" rx="10" ry="4" fill="#8B6914"/>
    <ellipse cx="566" cy="80" rx="4" ry="7" fill="#FF8C00" opacity="0.7">
      <animate attributeName="ry" values="7;5;7" dur="1.2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="566" cy="80" rx="2" ry="4" fill="#FFD700">
      <animate attributeName="ry" values="4;2;4" dur="1.2s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Diya 6 -->
  <g filter="url(#flameGlow)">
    <path d="M666,102 Q676,117 686,102 Q681,92 666,102Z" fill="#D4A017"/>
    <ellipse cx="676" cy="102" rx="10" ry="4" fill="#8B6914"/>
    <ellipse cx="676" cy="82" rx="4" ry="7" fill="#FF8C00" opacity="0.7">
      <animate attributeName="ry" values="7;5;7" dur="0.85s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="676" cy="82" rx="2" ry="4" fill="#FFD700">
      <animate attributeName="ry" values="4;2;4" dur="0.85s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Diya 7 -->
  <g filter="url(#flameGlow)">
    <path d="M772,100 Q782,115 792,100 Q787,90 772,100Z" fill="#D4A017"/>
    <ellipse cx="782" cy="100" rx="10" ry="4" fill="#8B6914"/>
    <ellipse cx="782" cy="80" rx="4" ry="7" fill="#FF8C00" opacity="0.7">
      <animate attributeName="ry" values="7;5;7" dur="1.05s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="782" cy="80" rx="2" ry="4" fill="#FFD700">
      <animate attributeName="ry" values="4;2;4" dur="1.05s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Central closing text -->
  <text x="450" y="30" font-family="Georgia, serif" font-size="17" font-weight="bold"
        text-anchor="middle" fill="#FFD700" filter="url(#textGlow)" letter-spacing="2">
    🪔  Jai Shri Ram  🪔
  </text>
  <text x="450" y="52" font-family="Georgia, serif" font-size="12" font-style="italic"
        text-anchor="middle" fill="#FFA500" letter-spacing="1" opacity="0.85">
    May every commit be an act of Dharma
  </text>
  <text x="450" y="70" font-family="Georgia, serif" font-size="11"
        text-anchor="middle" fill="#FFF8DC" opacity="0.5" letter-spacing="0.5">
    — Inspired by the Valmiki Ramayana —
  </text>

  <!-- Bottom decorative line -->
  <line x1="0" y1="138" x2="900" y2="138" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
</svg>
