<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep dark sky gradient -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0005"/>
      <stop offset="50%" style="stop-color:#1a0010"/>
      <stop offset="100%" style="stop-color:#2d0820"/>
    </linearGradient>

    <!-- Golden glow gradient -->
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
    </radialGradient>

    <!-- Arrow shaft gradient -->
    <linearGradient id="shaftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B6914"/>
      <stop offset="50%" style="stop-color:#D4A017"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>

    <!-- Text reveal clip path - expands from left to right as arrow moves -->
    <clipPath id="reveal1">
      <rect x="0" y="0" width="0" height="280">
        <animate attributeName="width" from="0" to="900" dur="2.5s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </rect>
    </clipPath>
    <clipPath id="reveal2">
      <rect x="0" y="0" width="0" height="280">
        <animate attributeName="width" from="0" to="900" dur="2s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </rect>
    </clipPath>
    <clipPath id="reveal3">
      <rect x="0" y="0" width="0" height="280">
        <animate attributeName="width" from="0" to="900" dur="2s" begin="1.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </rect>
    </clipPath>

    <!-- Feather filter for glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#sky)"/>

  <!-- Stars layer -->
  <g opacity="0.7">
    <circle cx="50" cy="20" r="1" fill="#FFD700"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="130" cy="45" r="1.5" fill="#FFF8DC"><animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="15" r="1" fill="#FFD700"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="35" r="1" fill="#FFF8DC"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="10" r="1.5" fill="#FFD700"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="50" r="1" fill="#FFF8DC"><animate attributeName="opacity" values="1;0.5;1" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="570" cy="22" r="1.5" fill="#FFD700"><animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="38" r="1" fill="#FFF8DC"><animate attributeName="opacity" values="1;0.4;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="730" cy="12" r="1" fill="#FFD700"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="28" r="1.5" fill="#FFF8DC"><animate attributeName="opacity" values="1;0.2;1" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="870" cy="55" r="1" fill="#FFD700"><animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="90" cy="70" r="1" fill="#FFD700"><animate attributeName="opacity" values="1;0.3;1" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="65" r="1.5" fill="#FFF8DC"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Lotus decorative divider top -->
  <g opacity="0.4" clip-path="url(#reveal1)">
    <path d="M390 55 Q400 45 410 55 Q400 50 390 55Z" fill="#FF8C00"/>
    <path d="M395 55 Q400 42 405 55 Q400 48 395 55Z" fill="#FFD700"/>
    <path d="M385 58 Q400 48 415 58" stroke="#FF8C00" stroke-width="0.5" fill="none"/>
  </g>

  <!-- MAIN TITLE — revealed by arrow -->
  <text x="450" y="130" font-family="Georgia, serif" font-size="58" font-weight="bold"
        text-anchor="middle" fill="#FFD700" filter="url(#softglow)" clip-path="url(#reveal1)"
        letter-spacing="3">
    Binayak Hazra
  </text>

  <!-- Subtitle line 1 -->
  <text x="450" y="168" font-family="Georgia, serif" font-size="17"
        text-anchor="middle" fill="#FFA500" clip-path="url(#reveal2)" letter-spacing="1.5">
    Full Stack MERN Developer  ·  Competitive Programmer
  </text>

  <!-- Subtitle line 2 -->
  <text x="450" y="194" font-family="Georgia, serif" font-size="15"
        text-anchor="middle" fill="#FFD700" clip-path="url(#reveal3)" letter-spacing="1" opacity="0.85">
    Abacus Grandmaster  ·  Vedam School of Technology
  </text>

  <!-- Decorative golden line revealed under title -->
  <line x1="200" y1="148" x2="700" y2="148" stroke="#FFD700" stroke-width="0.8" opacity="0.4" clip-path="url(#reveal2)"/>

  <!-- THE FLYING ARROW -->
  <g>
    <!-- Arrow group animates across the screen -->
    <g filter="url(#glow)">
      <!-- Arrow tip glow trail -->
      <ellipse cx="-60" cy="108" rx="40" ry="6" fill="#FFD700" opacity="0.12">
        <animate attributeName="cx" from="-60" to="960" dur="2.5s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.4 1"/>
        <animate attributeName="opacity" values="0;0.15;0.05;0" dur="2.5s" begin="0s" fill="freeze"/>
      </ellipse>

      <!-- Arrow shaft -->
      <line x1="-20" y1="108" x2="40" y2="108" stroke="url(#shaftGrad)" stroke-width="3" stroke-linecap="round">
        <animate attributeName="x1" from="-20" to="920" dur="2.5s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.4 1"/>
        <animate attributeName="x2" from="40" to="980" dur="2.5s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.4 1"/>
      </line>

      <!-- Arrowhead (triangle pointing right) -->
      <polygon points="40,104 40,112 55,108" fill="#FFD700">
        <animate attributeName="points"
          from="40,104 40,112 55,108"
          to="960,104 960,112 975,108"
          dur="2.5s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.4 1"/>
      </polygon>

      <!-- Feather 1 (top) -->
      <path d="M -20,108 Q -30,100 -20,104" fill="#8B4513" opacity="0.9">
        <animate attributeName="d"
          from="M -20,108 Q -30,100 -20,104"
          to="M 920,108 Q 910,100 920,104"
          dur="2.5s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.4 1"/>
      </path>
      <!-- Feather 2 (bottom) -->
      <path d="M -20,108 Q -30,116 -20,112" fill="#8B4513" opacity="0.9">
        <animate attributeName="d"
          from="M -20,108 Q -30,116 -20,112"
          to="M 920,108 Q 910,116 920,112"
          dur="2.5s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.4 1"/>
      </path>
      <!-- Feather 3 (top) -->
      <path d="M -28,108 Q -38,99 -27,104" fill="#A0522D" opacity="0.8">
        <animate attributeName="d"
          from="M -28,108 Q -38,99 -27,104"
          to="M 912,108 Q 902,99 913,104"
          dur="2.5s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.4 1"/>
      </path>
    </g>
  </g>

  <!-- Bottom decorative border with Om-like pattern -->
  <g opacity="0.35" clip-path="url(#reveal3)">
    <line x1="0" y1="235" x2="900" y2="235" stroke="#FFD700" stroke-width="0.5"/>
    <!-- Repeating diamond pattern -->
    <g fill="#FFD700">
      <polygon points="100,235 105,230 110,235 105,240"/>
      <polygon points="200,235 205,230 210,235 205,240"/>
      <polygon points="300,235 305,230 310,235 305,240"/>
      <polygon points="400,235 405,230 410,235 405,240"/>
      <polygon points="500,235 505,230 510,235 505,240"/>
      <polygon points="600,235 605,230 610,235 605,240"/>
      <polygon points="700,235 705,230 710,235 705,240"/>
      <polygon points="800,235 805,230 810,235 805,240"/>
    </g>
  </g>

  <!-- Bottom quote — fades in last -->
  <text x="450" y="258" font-family="Georgia, serif" font-size="12" font-style="italic"
        text-anchor="middle" fill="#FFA500" opacity="0" letter-spacing="0.5">
    ❝ Dharma protects those who protect Dharma — Valmiki Ramayana ❞
    <animate attributeName="opacity" from="0" to="0.75" dur="1.5s" begin="2.2s" fill="freeze"/>
  </text>
</svg>
