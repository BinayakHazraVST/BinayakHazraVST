<svg width="900" height="30" viewBox="0 0 900 30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="divLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#FFD700;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#FFD700;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="30" fill="transparent"/>

  <!-- Main line -->
  <line x1="0" y1="15" x2="900" y2="15" stroke="url(#divLine)" stroke-width="1"/>

  <!-- Center lotus ornament -->
  <g transform="translate(450,15)">
    <circle cx="0" cy="0" r="6" fill="#1a0010" stroke="#FFD700" stroke-width="1"/>
    <!-- Lotus petals -->
    <ellipse cx="0" cy="-9" rx="2.5" ry="5" fill="#FFD700" opacity="0.8" transform="rotate(0)"/>
    <ellipse cx="0" cy="-9" rx="2.5" ry="5" fill="#FFD700" opacity="0.6" transform="rotate(45)"/>
    <ellipse cx="0" cy="-9" rx="2.5" ry="5" fill="#FFD700" opacity="0.8" transform="rotate(90)"/>
    <ellipse cx="0" cy="-9" rx="2.5" ry="5" fill="#FFD700" opacity="0.6" transform="rotate(135)"/>
    <ellipse cx="0" cy="-9" rx="2.5" ry="5" fill="#FFD700" opacity="0.8" transform="rotate(180)"/>
    <ellipse cx="0" cy="-9" rx="2.5" ry="5" fill="#FFD700" opacity="0.6" transform="rotate(225)"/>
    <ellipse cx="0" cy="-9" rx="2.5" ry="5" fill="#FFD700" opacity="0.8" transform="rotate(270)"/>
    <ellipse cx="0" cy="-9" rx="2.5" ry="5" fill="#FFD700" opacity="0.6" transform="rotate(315)"/>
    <circle cx="0" cy="0" r="3" fill="#FFD700"/>
  </g>

  <!-- Side diamonds -->
  <polygon points="350,15 354,11 358,15 354,19" fill="#FFD700" opacity="0.7"/>
  <polygon points="542,15 546,11 550,15 546,19" fill="#FFD700" opacity="0.7"/>
  <polygon points="270,15 273,12 276,15 273,18" fill="#FFD700" opacity="0.4"/>
  <polygon points="624,15 627,12 630,15 627,18" fill="#FFD700" opacity="0.4"/>
</svg>
