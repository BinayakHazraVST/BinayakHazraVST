<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0020"/>
      <stop offset="60%" style="stop-color:#0d0030"/>
      <stop offset="100%" style="stop-color:#060015"/>
    </linearGradient>
    <linearGradient id="waterShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000050;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#0000A0;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#000050;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="shimmerGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="900" height="120" fill="url(#oceanGrad)" rx="8"/>
  <rect x="0" y="0" width="4" height="120" fill="#FF4500" rx="2"/>
  <rect x="896" y="0" width="4" height="120" fill="#FF4500" rx="2"/>

  <!-- Ocean waves animated -->
  <g opacity="0.35">
    <!-- Wave 1 -->
    <path d="M0,85 Q50,75 100,85 Q150,95 200,85 Q250,75 300,85 Q350,95 400,85 Q450,75 500,85 Q550,95 600,85 Q650,75 700,85 Q750,95 800,85 Q850,75 900,85 L900,120 L0,120Z" fill="#000080" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="-100,0" dur="4s" repeatCount="indefinite"/>
    </path>
    <!-- Wave 2 -->
    <path d="M0,90 Q60,82 120,90 Q180,98 240,90 Q300,82 360,90 Q420,98 480,90 Q540,82 600,90 Q660,98 720,90 Q780,82 840,90 Q870,82 900,90 L900,120 L0,120Z" fill="#000090" opacity="0.4">
      <animateTransform attributeName="transform" type="translate" from="-100,0" to="0,0" dur="5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Water shimmer reflections -->
  <g opacity="0.2">
    <line x1="100" y1="95" x2="130" y2="95" stroke="#4169E1" stroke-width="1"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/></line>
    <line x1="300" y1="98" x2="340" y2="98" stroke="#4169E1" stroke-width="1"><animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite"/></line>
    <line x1="550" y1="96" x2="580" y2="96" stroke="#4169E1" stroke-width="1"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/></line>
    <line x1="750" y1="100" x2="800" y2="100" stroke="#4169E1" stroke-width="1"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.8s" repeatCount="indefinite"/></line>
  </g>

  <!-- Ram Setu bridge stones — building loop: appear staggered, hold, fade out, repeat -->
  <g>
    <rect x="30" y="78" width="55" height="14" rx="7" fill="#8B7355">
      <animate attributeName="opacity"
        values="0;0;0.8;0.8;0;0"
        keyTimes="0;0.0;0.025;0.65;0.8;1"
        dur="12s" repeatCount="indefinite"
        calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.3 0 0.1 1;0 0 1 1"/>
    </rect>
    <rect x="92" y="76" width="60" height="14" rx="7" fill="#9B8365">
      <animate attributeName="opacity"
        values="0;0;0.8;0.8;0;0"
        keyTimes="0;0.025;0.05;0.65;0.8;1"
        dur="12s" repeatCount="indefinite"
        calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.3 0 0.1 1;0 0 1 1"/>
    </rect>
    <rect x="159" y="79" width="58" height="12" rx="6" fill="#8B7355">
      <animate attributeName="opacity"
        values="0;0;0.8;0.8;0;0"
        keyTimes="0;0.05;0.075;0.65;0.8;1"
        dur="12s" repeatCount="indefinite"
        calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.3 0 0.1 1;0 0 1 1"/>
    </rect>
    <rect x="224" y="77" width="62" height="13" rx="6" fill="#9B8365">
      <animate attributeName="opacity"
        values="0;0;0.8;0.8;0;0"
        keyTimes="0;0.075;0.1;0.65;0.8;1"
        dur="12s" repeatCount="indefinite"
        calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.3 0 0.1 1;0 0 1 1"/>
    </rect>
    <rect x="293" y="78" width="57" height="14" rx="7" fill="#8B7355">
      <animate attributeName="opacity"
        values="0;0;0.8;0.8;0;0"
        keyTimes="0;0.1;0.125;0.65;0.8;1"
        dur="12s" repeatCount="indefinite"
        calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.3 0 0.1 1;0 0 1 1"/>
    </rect>
    <rect x="357" y="76" width="63" height="14" rx="7" fill="#9B8365">
      <animate attributeName="opacity"
        values="0;0;0.8;0.8;0;0"
        keyTimes="0;0.125;0.15;0.65;0.8;1"
        dur="12s" repeatCount="indefinite"
        calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.3 0 0.1 1;0 0 1 1"/>
    </rect>
    <rect x="427" y="79" width="56" height="12" rx="6" fill="#8B7355">
      <animate attributeName="opacity"
        values="0;0;0.8;0.8;0;0"
        keyTimes="0;0.15;0.175;0.65;0.8;1"
        dur="12s" repeatCount="indefinite"
        calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.3 0 0.1 1;0 0 1 1"/>
    </rect>
    <rect x="490" y="77" width="60" height="13" rx="6" fill="#9B8365">
      <animate attributeName="opacity"
        values="0;0;0.8;0.8;0;0"
        keyTimes="0;0.175;0.2;0.65;0.8;1"
        dur="12s" repeatCount="indefinite"
        calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.3 0 0.1 1;0 0 1 1"/>
    </rect>
    <rect x="557" y="78" width="58" height="14" rx="7" fill="#8B7355">
      <animate attributeName="opacity"
        values="0;0;0.8;0.8;0;0"
        keyTimes="0;0.2;0.225;0.65;0.8;1"
        dur="12s" repeatCount="indefinite"
        calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.3 0 0.1 1;0 0 1 1"/>
    </rect>
    <rect x="622" y="76" width="61" height="14" rx="7" fill="#9B8365">
      <animate attributeName="opacity"
        values="0;0;0.8;0.8;0;0"
        keyTimes="0;0.225;0.25;0.65;0.8;1"
        dur="12s" repeatCount="indefinite"
        calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.3 0 0.1 1;0 0 1 1"/>
    </rect>
    <rect x="690" y="79" width="57" height="12" rx="6" fill="#8B7355">
      <animate attributeName="opacity"
        values="0;0;0.8;0.8;0;0"
        keyTimes="0;0.25;0.275;0.65;0.8;1"
        dur="12s" repeatCount="indefinite"
        calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.3 0 0.1 1;0 0 1 1"/>
    </rect>
    <rect x="754" y="77" width="62" height="13" rx="6" fill="#9B8365">
      <animate attributeName="opacity"
        values="0;0;0.8;0.8;0;0"
        keyTimes="0;0.275;0.3;0.65;0.8;1"
        dur="12s" repeatCount="indefinite"
        calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.3 0 0.1 1;0 0 1 1"/>
    </rect>
    <rect x="823" y="78" width="55" height="14" rx="7" fill="#8B7355">
      <animate attributeName="opacity"
        values="0;0;0.8;0.8;0;0"
        keyTimes="0;0.3;0.325;0.65;0.8;1"
        dur="12s" repeatCount="indefinite"
        calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.3 0 0.1 1;0 0 1 1"/>
    </rect>
  </g>

  <!-- Chapter label -->
  <text x="450" y="30" font-family="Georgia, serif" font-size="11" fill="#FFA500" letter-spacing="4" text-anchor="middle" opacity="0.9">CHAPTER V  ·  MISSION &amp; VISION</text>
  <text x="450" y="58" font-family="Georgia, serif" font-size="13" fill="#FFF8DC" text-anchor="middle" font-style="italic" opacity="0.8">
    ❝ Ram built a bridge across an ocean. I build software that bridges ideas to reality. ❞
  </text>

  <!-- Stars -->
  <circle cx="50" cy="18" r="1" fill="#FFD700"><animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="850" cy="22" r="1.2" fill="#FFD700"><animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/></circle>
</svg>
