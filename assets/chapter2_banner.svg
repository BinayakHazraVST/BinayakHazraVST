<svg width="900" height="90" viewBox="0 0 900 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgArsenal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d000a"/>
      <stop offset="50%" style="stop-color:#1a0010"/>
      <stop offset="100%" style="stop-color:#0d000a"/>
    </linearGradient>
    <filter id="arrowGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="shaftGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B6914"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>

  <rect width="900" height="90" fill="url(#bgArsenal)" rx="6"/>
  <rect x="0" y="0" width="4" height="90" fill="#FF8C00" rx="2"/>
  <rect x="896" y="0" width="4" height="90" fill="#FF8C00" rx="2"/>

  <!-- Section label -->
  <text x="450" y="22" font-family="Georgia, serif" font-size="11" fill="#FFA500" letter-spacing="4" text-anchor="middle" opacity="0.9">CHAPTER II  ·  THE ARSENAL</text>
  <line x1="200" y1="28" x2="700" y2="28" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>

  <!-- 5 animated arrows flying left to right at different speeds/heights -->

  <!-- Arrow 1 — slowest, top -->
  <g filter="url(#arrowGlow)">
    <line x1="-100" y1="48" x2="-40" y2="48" stroke="url(#shaftGold)" stroke-width="2.5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" from="-900,0" to="1800,0" dur="4s" begin="0s" repeatCount="indefinite"/>
    </line>
    <polygon points="-40,44 -40,52 -28,48" fill="#FFD700">
      <animateTransform attributeName="transform" type="translate" from="-900,0" to="1800,0" dur="4s" begin="0s" repeatCount="indefinite"/>
    </polygon>
    <path d="M-100,48 Q-108,43 -100,46" fill="#8B4513">
      <animateTransform attributeName="transform" type="translate" from="-900,0" to="1800,0" dur="4s" begin="0s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Arrow 2 — faster, lower -->
  <g filter="url(#arrowGlow)" opacity="0.85">
    <line x1="-100" y1="62" x2="-40" y2="62" stroke="url(#shaftGold)" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" from="-900,0" to="1800,0" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
    </line>
    <polygon points="-40,58 -40,66 -28,62" fill="#FFA500">
      <animateTransform attributeName="transform" type="translate" from="-900,0" to="1800,0" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
    </polygon>
    <path d="M-100,62 Q-108,57 -100,60" fill="#A0522D">
      <animateTransform attributeName="transform" type="translate" from="-900,0" to="1800,0" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Arrow 3 — medium speed, mid -->
  <g filter="url(#arrowGlow)" opacity="0.75">
    <line x1="-100" y1="55" x2="-40" y2="55" stroke="url(#shaftGold)" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" from="-900,0" to="1800,0" dur="3.4s" begin="1.2s" repeatCount="indefinite"/>
    </line>
    <polygon points="-40,51 -40,59 -28,55" fill="#FFD700">
      <animateTransform attributeName="transform" type="translate" from="-900,0" to="1800,0" dur="3.4s" begin="1.2s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Arrow 4 — fastest -->
  <g filter="url(#arrowGlow)" opacity="0.6">
    <line x1="-100" y1="70" x2="-50" y2="70" stroke="url(#shaftGold)" stroke-width="1.5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" from="-900,0" to="1800,0" dur="2s" begin="1.8s" repeatCount="indefinite"/>
    </line>
    <polygon points="-50,67 -50,73 -40,70" fill="#FF8C00">
      <animateTransform attributeName="transform" type="translate" from="-900,0" to="1800,0" dur="2s" begin="1.8s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Subtitle text overlay -->
  <text x="450" y="58" font-family="Georgia, serif" font-size="13" fill="#FFF8DC"
        text-anchor="middle" opacity="0.7" font-style="italic">
    ❝ Shri Ram's bow never missed. Neither does my code. ❞
  </text>
</svg>
